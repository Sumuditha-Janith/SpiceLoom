<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SpiceLoom - Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h4 class="text-center mb-3">Forgot Password</h4>
                    <form id="forgotForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">Enter your registered email</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div id="message" class="text-success small mb-2"></div>
                        <div id="errorMsg" class="text-danger small mb-2"></div>
                        <button type="submit" class="btn btn-warning w-100">Send OTP</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="login.html">Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $('#forgotForm').submit(function(e) {
        e.preventDefault();
        const email = $('#email').val();
        $.ajax({
            url: '/api/auth/forgot-password',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ email }),
            success: function(res) {
                $('#message').text('OTP sent! Check your email.');
                $('#errorMsg').text('');
                // redirect to reset page after short delay
                setTimeout(() => {
                    window.location.href = 'reset-password.html?email=' + encodeURIComponent(email);
                }, 2000);
            },
            error: function(xhr) {
                $('#errorMsg').text(xhr.responseJSON?.error || 'Request failed');
                $('#message').text('');
            }
        });
    });
</script>
</body>
</html>
