<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SpiceLoom - Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .product-card {
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .original-price {
            text-decoration: line-through;
            color: #999;
        }
        .discount-badge {
            position: absolute;
            top: 10px;
            right: 10px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <span class="navbar-brand">SpiceLoom Catalog</span>
        <div>
            <a href="customer-dashboard.html" class="btn btn-outline-light btn-sm">Home</a>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row mb-4 align-items-end">
        <div class="col-md-4">
            <label class="form-label">Sort By</label>
            <select id="sortSelect" class="form-select">
                <option value="">Default</option>
                <option value="price_asc">Price: Low to High</option>
                <option value="price_desc">Price: High to Low</option>
                <option value="name_asc">Name: A to Z</option>
                <option value="name_desc">Name: Z to A</option>
            </select>
        </div>
        <div class="col-md-4">
            <div class="form-check mt-4">
                <input class="form-check-input" type="checkbox" id="onSaleFilter">
                <label class="form-check-label" for="onSaleFilter">On Sale Only</label>
            </div>
        </div>
    </div>

    <div class="row" id="productGrid">
        <!-- Cards will be injected here -->
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../js/customer-catalog.js"></script>
<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';
    $.ajax({
        url: '/api/auth/me',
        headers: { 'Authorization': 'Bearer ' + token },
        error: function() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    });
    $('#logoutBtn').click(function() {
        localStorage.clear();
        window.location.href = '../index.html';
    });
</script>
</body>
</html>
