<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sale Events - SpiceLoom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Sale Events</span>
        <div>
            <a href="admin-dashboard.html" class="btn btn-outline-light btn-sm">Dashboard</a>
            <a href="admin-products.html" class="btn btn-outline-light btn-sm">Products</a>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h3>Manage Sale Events</h3>
    <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#saleModal" onclick="clearSaleForm()">Add New Sale</button>
    <table class="table table-bordered table-striped" id="saleTable">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Product</th>
            <th>Discount %</th>
            <th>Start</th>
            <th>End</th>
            <th>Active</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- Sale Event Modal -->
<div class="modal fade" id="saleModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="saleForm">
                <div class="modal-header">
                    <h5 class="modal-title">Sale Event</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="saleValidationError" class="alert alert-danger" style="display:none;"></div>
                    <input type="hidden" id="saleEventId">
                    <div class="mb-3">
                        <label class="form-label">Product (optional - leave empty for global)</label>
                        <select class="form-select" id="productIdSelect">
                            <option value="">Global (all products)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Discount Percent</label>
                        <input type="number" class="form-control" id="discountPercent" min="0" max="100" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Start Date & Time</label>
                        <input type="datetime-local" class="form-control" id="startDate" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">End Date & Time</label>
                        <input type="datetime-local" class="form-control" id="endDate" required>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="activeCheck" checked>
                        <label class="form-check-label">Active</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/admin-sales.js"></script>
</body>
</html>
