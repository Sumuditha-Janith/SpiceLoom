<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Orders - SpiceLoom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <span class="navbar-brand">My Orders</span>
        <div>
            <a href="customer-dashboard.html" class="btn btn-outline-light btn-sm">Home</a>
            <a href="customer-catalog.html" class="btn btn-outline-light btn-sm">Shop</a>
            <a href="customer-cart.html" class="btn btn-outline-light btn-sm">Cart</a>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>Order History</h2>
    <table class="table table-striped" id="ordersTable">
        <thead>
        <tr>
            <th>Order ID</th>
            <th>Date</th>
            <th>Total (Rs.)</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../js/customer-orders.js"></script>
<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';
    $('#logoutBtn').click(function() {
        localStorage.clear();
        window.location.href = '../index.html';
    });
</script>
</body>
</html>
