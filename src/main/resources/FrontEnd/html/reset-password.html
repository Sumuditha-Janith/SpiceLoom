<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SpiceLoom - Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h4 class="text-center mb-3">Reset Password</h4>
                    <form id="resetForm">
                        <input type="hidden" id="emailInput">
                        <div class="mb-3">
                            <label for="otp" class="form-label">OTP Code</label>
                            <input type="text" class="form-control" id="otp" required>
                        </div>
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">New Password</label>
                            <input type="password" class="form-control" id="newPassword" required>
                        </div>
                        <div id="message" class="text-success small mb-2"></div>
                        <div id="errorMsg" class="text-danger small mb-2"></div>
                        <button type="submit" class="btn btn-success w-100">Reset Password</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="login.html">Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get('email');
    if (email) {
        $('#emailInput').val(email);
    } else {
        alert('No email provided. Please request OTP first.');
        window.location.href = 'forgot-password.html';
    }

    $('#resetForm').submit(function(e) {
        e.preventDefault();
        const data = {
            email: $('#emailInput').val(),
            otp: $('#otp').val(),
            newPassword: $('#newPassword').val()
        };
        $.ajax({
            url: '/api/auth/reset-password',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function(res) {
                $('#message').text('Password reset successfully! Redirecting...');
                $('#errorMsg').text('');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            },
            error: function(xhr) {
                $('#errorMsg').text(xhr.responseJSON?.error || 'Reset failed');
                $('#message').text('');
            }
        });
    });
</script>
</body>
</html>
