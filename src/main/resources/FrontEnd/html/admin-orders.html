<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Management - SpiceLoom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Order Management</span>
        <div>
            <a href="admin-dashboard.html" class="btn btn-outline-light btn-sm">Dashboard</a>
            <a href="admin-products.html" class="btn btn-outline-light btn-sm">Products</a>
            <a href="admin-sales.html" class="btn btn-outline-light btn-sm">Sales</a>
            <button id="downloadReportBtn" class="btn btn-outline-light btn-sm">Download Report</button>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h3>All Orders</h3>
    <table class="table table-striped" id="adminOrdersTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>Customer</th>
            <th>Date</th>
            <th>Total (Rs.)</th>
            <th>Status</th>
            <th>Update</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../js/admin-orders.js"></script>
<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';
    $('#logoutBtn').click(function() {
        localStorage.clear();
        window.location.href = '../index.html';
    });
</script>
</body>
</html>
